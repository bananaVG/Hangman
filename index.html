        body {

            background-color: #ffffff;

            margin-top: 1rem;

        .guess-input, .topic-select {

            border-radius: 0.75rem;
            font-size: 1rem;
            text-align: center;
            outline: none;

            color: #4a5568;
            width: 100%;

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;

            white-space: nowrap;
        }
        .btn-primary {
            background-color: #4299e1;
            color: white;
            border: none;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #3182ce;
            transform: translateY(-1px);
        }
        .btn-primary:active:not(:disabled) {
            background-color: #2b6cb0;
            transform: translateY(0);
        }
        .btn-secondary {
            background-color: #a0aec0;
            color: white;
            border: none;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: #718096;
            transform: translateY(-1px);
        }
        .btn-secondary:active:not(:disabled) {
            background-color: #5b6e82;
            transform: translateY(0);
        }
        .btn-hint {
            background-color: #f6ad55;
            color: white;
            border: none;

        .btn-hint:hover:not(:disabled) {

            transform: translateY(-1px);

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: grid;

            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            transition: opacity 0.45s ease, transform 0.45s ease;
            transform-origin: center;
        }
        .overlay-sq.revealed {
            opacity: 0;
            transform: scale(0.05);
            pointer-events: none;
        }

        /* Timer warning */
        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .timer-warning {
            color: #e53e3e !important;
            animation: timerPulse 0.8s ease-in-out infinite;

<body>

        <div id="setup-section" class="flex flex-col gap-4">
            <div class="select-group">
                <select id="topic-select" class="topic-select">
                    <option value="" disabled selected>Choose a topic to begin...</option>
                    <option value="animals">Animals</option>
                    <option value="foods">Foods</option>
                    <option value="countries">Countries</option>
                    <option value="gpu">GPUs</option>

        <div id="game-section" class="hidden">
            <pre id="hangman-stage"></pre>
            <h2 id="topic-display" class="text-xl font-semibold text-gray-600"></h2>

            <div id="image-section">
                <img id="word-image" src="" alt="">
                <div id="image-overlay"></div>
            </div>

            <div id="timer-info"></div>
            <div id="word-display"></div>
            <div id="guessed-letters"></div>
            <p id="message" class="message text-red-500 font-semibold"></p>

            <div class="input-group">
                <input type="text" id="guess-input" class="guess-input" placeholder="Guess a letter or the word">
                <button id="guess-button" class="btn btn-primary">Submit</button>
            </div>

            <div class="button-row">
                <button id="hint-button" class="btn btn-hint">Get Hint ( -10s)</button>
                <button id="new-game-button" class="btn btn-secondary">New Game</button>
            </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

                    ]
                },
                countries: {
                    words: ["canada", "brazil", "egypt", "japan", "india", "france", "mexico", "russia", "china", "australia"],
                    wikiTerms: ["Canada", "Brazil", "Egypt", "Japan", "India", "France", "Mexico", "Russia", "China", "Australia"],
                    hints: [
                        ["Very polite, very cold", "Two languages, one peace", "More lakes than anywhere else"],
                        ["Carnival energy, jungle depth", "Where the Amazon begins", "Five-time world champions"],
                        ["Sand, stone, and ancient secrets", "Where rivers built empires", "Pyramids predate almost everything"],

                    hints: [

                },
                phones: {

                    wikiTerms: ["IPhone", "Android (operating system)", "Samsung Galaxy", "Pixel (smartphone)", "Nokia", "Motorola", "OnePlus", "Xiaomi", "BlackBerry", "Huawei"],
                    hints: [
                        ["A fruit, a trillion dollars, a phone", "Lightning port caused drama", "One button, then none"],
                        ["Free and open, powers most pockets", "Google's OS, everyone's phone", "Runs on everything, owned by no one"],
                        ["Galaxy-branded, Korea-born", "Foldables before anyone else", "Makes chips for itself and rivals"],

                    ]
                },
                videoGames: {
                    words: ["minecraft", "fortnite", "zelda", "mario", "pokemon", "roblox", "tetris", "pacman", "overwatch", "eldenring"],
                    wikiTerms: ["Minecraft", "Fortnite", "The Legend of Zelda", "Mario (franchise)", "Pokémon", "Roblox", "Tetris", "Pac-Man", "Overwatch (video game)", "Elden Ring"],
                    hints: [
                        ["Infinite world, square everything", "Creeper hiss means run", "Best-selling game ever made"],
                        ["100 drop in, one flies out", "Build walls mid-fight", "Season passes and banana skins"],
                        ["Triforce, not a torch", "Link fights, she gets the title", "Hyrule is always in danger"],
                        ["Overalls, no explanation needed", "Coins, mushrooms, and castles", "Plumber who never plumbs"],
                        ["Gotta catch 'em... you know", "Red or Blue, the divide remains", "Pikachu is just the mascot"],
                        ["Kids built the game you're playing", "User-made worlds, endless genres", "Robux is its currency"],
                        ["Falling shapes, rising panic", "Russian origin, global obsession", "There's no winning, only surviving longer"],
                        ["Chomp or be chomped", "Maze runner since 1980", "Four ghosts, one yellow circle"],

                    ]
                }
            };

            // DOM Elements
            const setupSection = document.getElementById('setup-section');
            const gameSection = document.getElementById('game-section');
            const topicSelect = document.getElementById('topic-select');
            const topicDisplay = document.getElementById('topic-display');
            const hangmanStage = document.getElementById('hangman-stage');
            const timerInfo = document.getElementById('timer-info');
            const wordDisplay = document.getElementById('word-display');
            const guessedLettersDisplay = document.getElementById('guessed-letters');
            const messageDisplay = document.getElementById('message');
            const guessInput = document.getElementById('guess-input');
            const guessButton = document.getElementById('guess-button');
            const hintButton = document.getElementById('hint-button');
            const newGameButton = document.getElementById('new-game-button');
            const wordImage = document.getElementById('word-image');
            const imageOverlay = document.getElementById('image-overlay');

            // Game State
            let selectedWord = '';
            let selectedHint = '';
            let guessedLetters = new Set();
            let wrongGuesses = 0;
            let timer;
            let timeLeft = 60;
            const HINT_PENALTY = 10;
            const MAX_WRONG_GUESSES = 6;

            // Image reveal state
            let imageSquares = [];
            let revealedCount = 0;

            // Image grid functions
            const fetchWordImage = async (wikiTerm) => {
                wordImage.src = '';
                try {
                    const res = await fetch(
                        `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTerm)}&prop=pageimages&format=json&pithumbsize=500&origin=*`
                    );
                    const data = await res.json();
                    const pages = data.query.pages;
                    const page = pages[Object.keys(pages)[0]];
                    if (page?.thumbnail?.source) wordImage.src = page.thumbnail.source;
                } catch (e) { /* placeholder stays */ }
            };

            const setupImageGrid = (wordLength) => {
                imageOverlay.innerHTML = '';
                imageSquares = [];
                revealedCount = 0;

                const n = wordLength;
                const cols = n <= 5 ? n : Math.ceil(n / 2);
                const rows = Math.ceil(n / cols);
                const totalCells = cols * rows;

                imageOverlay.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

                const active = [];
                for (let i = 0; i < totalCells; i++) {
                    const sq = document.createElement('div');
                    if (i < n) {
                        sq.classList.add('overlay-sq');
                        active.push(sq);
                    } else {
                        sq.style.background = 'transparent';
                    }
                    imageOverlay.appendChild(sq);
                }

                // Fisher-Yates shuffle for random reveal order
                for (let i = active.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [active[i], active[j]] = [active[j], active[i]];
                }
                imageSquares = active;
            };

            const revealSquare = () => {
                if (revealedCount < imageSquares.length) {
                    imageSquares[revealedCount].classList.add('revealed');
                    revealedCount++;
                }
            };

            const revealAllSquares = () => {
                while (revealedCount < imageSquares.length) {
                    revealSquare();
                }
            };

            // Game functions
            const startGame = () => {
                const topicValue = topicSelect.value;
                if (!topicValue) return;

                const topicText = topicSelect.options[topicSelect.selectedIndex].text;
                topicDisplay.textContent = `Topic: ${topicText}`;

                wrongGuesses = 0;
                guessedLetters = new Set();
                timeLeft = 60;
                timerInfo.classList.remove('timer-warning');
                messageDisplay.textContent = '';

                const wordList = topics[topicValue].words;
                const hintList = topics[topicValue].hints;
                const wikiTerms = topics[topicValue].wikiTerms;
                const randomIndex = Math.floor(Math.random() * wordList.length);
                selectedWord = wordList[randomIndex].toUpperCase();
                const hintPool = hintList[randomIndex];
                selectedHint = hintPool[Math.floor(Math.random() * hintPool.length)];

                setupImageGrid(selectedWord.length);
                fetchWordImage(wikiTerms[randomIndex]);

                setupSection.classList.add('hidden');
                gameSection.classList.remove('hidden');

                guessInput.value = '';
                guessInput.focus();

                guessButton.disabled = false;
                guessInput.disabled = false;
                hintButton.disabled = false;

                updateDisplay();
                startTimer();
            };

            const updateDisplay = () => {
                wordDisplay.textContent = selectedWord
                    .split('')
                    .map(letter => (guessedLetters.has(letter) ? letter : '_'))
                    .join(' ');

                hangmanStage.textContent = stages[wrongGuesses];
                guessedLettersDisplay.textContent = `Guessed: ${[...guessedLetters].sort().join(', ')}`;
                checkGameState();
            };

            const handleGuess = () => {
                const guess = guessInput.value.toUpperCase().trim();
                guessInput.value = '';
                messageDisplay.textContent = '';

                if (!guess) return;

                // Full word guess
                if (guess.length > 1) {
                    if (guess === selectedWord) {
                        for (const letter of selectedWord) {
                            guessedLetters.add(letter);
                        }
                    } else {
                        wrongGuesses++;
                        messageDisplay.textContent = `"${guess}" is not the word.`;
                    }
                // Single letter guess
                } else {
                    if (!/^[A-Z]$/.test(guess)) {
                        messageDisplay.textContent = 'Please enter a valid letter.';
                        return;
                    }
                    if (guessedLetters.has(guess)) {
                        messageDisplay.textContent = `You've already guessed "${guess}".`;
                        return;
                    }
                    guessedLetters.add(guess);
                    if (selectedWord.includes(guess)) {
                        revealSquare();
                    } else {
                        wrongGuesses++;
                    }
                }
                updateDisplay();
            };

            const checkGameState = () => {
                if (!wordDisplay.textContent.includes('_')) {
                    endGame('Congratulations! You won! 🎉', true);
                } else if (wrongGuesses >= MAX_WRONG_GUESSES) {
                    endGame(`Game over! The word was "${selectedWord}". 😔`, false);
                }
            };

            const startTimer = () => {
                clearInterval(timer);
                timerInfo.textContent = `Time Left: ${timeLeft}s`;
                timer = setInterval(() => {
                    timeLeft--;
                    timerInfo.textContent = `Time Left: ${timeLeft}s`;
                    if (timeLeft <= 30) timerInfo.classList.add('timer-warning');
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        endGame(`Time's up! The word was "${selectedWord}". ⏱️`, false);
                    }
                }, 1000);
            };

            const showHint = () => {
                if (timeLeft > HINT_PENALTY) {
                    timeLeft -= HINT_PENALTY;
                    timerInfo.textContent = `Time Left: ${timeLeft}s`;
                    messageDisplay.textContent = `Hint: ${selectedHint}`;
                    hintButton.disabled = true;
                } else {
                    messageDisplay.textContent = 'Not enough time for a hint!';
                }
            };

            const endGame = (message, isWin) => {
                clearInterval(timer);
                if (isWin) revealAllSquares();
                messageDisplay.textContent = message;
                wordDisplay.textContent = selectedWord.split('').join(' ');
                guessButton.disabled = true;
                guessInput.disabled = true;
                hintButton.disabled = true;
            };

            const resetToMenu = () => {
                clearInterval(timer);
                gameSection.classList.add('hidden');
                setupSection.classList.remove('hidden');
                topicSelect.value = "";
                topicDisplay.textContent = "";
            };

            // Event Listeners
            topicSelect.addEventListener('change', startGame);
            guessButton.addEventListener('click', handleGuess);
            guessInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleGuess();
            });
            hintButton.addEventListener('click', showHint);
            newGameButton.addEventListener('click', resetToMenu);
        });
    </script>
</body>
</html>
